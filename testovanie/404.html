<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow" />
  <title>404 — stratení vo vesmíre | MRAZOSOFT</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #000; color: #F2F3F5;
      display: flex; align-items: center; justify-content: center;
      text-align: center; padding: 24px; line-height: 1.6;
      background-image:
        radial-gradient(2px 2px at 15% 25%, rgba(255,255,255,.9), transparent 60%),
        radial-gradient(1.5px 1.5px at 65% 15%, rgba(224,234,255,.8), transparent 60%),
        radial-gradient(2px 2px at 80% 70%, rgba(255,255,255,.7), transparent 60%),
        radial-gradient(1.5px 1.5px at 30% 80%, rgba(224,234,255,.6), transparent 60%),
        radial-gradient(1px 1px at 50% 50%, rgba(255,255,255,.5), transparent 60%),
        radial-gradient(90% 70% at 50% 20%, #0b1224 0%, #000 70%);
    }
    .box { max-width: 480px; }
    .code {
      font-family: 'Space Grotesk', 'Inter', sans-serif; font-weight: 700;
      font-size: clamp(4rem, 18vw, 7rem); line-height: 1;
      background: linear-gradient(120deg, #38BDF8, #818CF8 48%, #A78BFA);
      -webkit-background-clip: text; background-clip: text; color: transparent;
      margin-bottom: 8px;
    }
    h1 { font-size: 1.4rem; margin-bottom: 10px; letter-spacing: -0.01em; }
    p { color: #9AA1AB; margin-bottom: 24px; }
    a {
      display: inline-block; padding: 12px 26px; border-radius: 999px;
      background: linear-gradient(120deg, #38BDF8, #818CF8 48%, #A78BFA);
      color: #04121d; font-weight: 600; text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="code">404</div>
    <h1>Táto planéta v našej sústave nie je</h1>
    <p>Stránka, ktorú hľadáte, neexistuje alebo odletela na inú obežnú dráhu.</p>
    <a href="/">Späť do sústavy</a>
  </div>
</body>
</html>
