<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow" />
  <title>Offline — MRAZOSOFT</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #000 radial-gradient(80% 60% at 50% 30%, #0b1224 0%, #000 70%);
      color: #F2F3F5; display: flex; align-items: center; justify-content: center;
      text-align: center; padding: 24px; line-height: 1.6;
      background-image:
        radial-gradient(2px 2px at 20% 30%, rgba(255,255,255,.9), transparent 60%),
        radial-gradient(1.5px 1.5px at 70% 20%, rgba(224,234,255,.8), transparent 60%),
        radial-gradient(2px 2px at 85% 65%, rgba(255,255,255,.7), transparent 60%),
        radial-gradient(1.5px 1.5px at 35% 75%, rgba(224,234,255,.6), transparent 60%),
        radial-gradient(80% 60% at 50% 30%, #0b1224 0%, #000 70%);
    }
    .box { max-width: 440px; }
    .sat { font-size: 3rem; margin-bottom: 14px; }
    h1 { font-size: 1.5rem; margin-bottom: 10px; letter-spacing: -0.01em; }
    p { color: #9AA1AB; margin-bottom: 22px; }
    a {
      display: inline-block; padding: 12px 24px; border-radius: 999px;
      background: linear-gradient(120deg, #38BDF8, #818CF8 48%, #A78BFA);
      color: #04121d; font-weight: 600; text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="sat">🛰️</div>
    <h1>Stratili sme spojenie so Zemou</h1>
    <p>Vyzerá to, že ste offline. Skontrolujte pripojenie — sústava tu na vás počká.</p>
    <a href="./">Skúsiť znova</a>
  </div>
</body>
</html>
