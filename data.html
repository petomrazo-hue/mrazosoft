<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>MRAZOSOFT — Dáta (first-party analytika)</title>
  <style>
    :root{--bg:#0B1120;--surface:#0f1a26;--surface2:#13202f;--border:rgba(255,255,255,.12);
      --text:#eaf1f8;--muted:#9fb0c2;--accent:#36c5f0;--grad:linear-gradient(135deg,#38BDF8,#818CF8);}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui,-apple-system,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);line-height:1.5;padding:24px;max-width:1000px;margin:0 auto}
    h1{font-size:1.5rem;margin-bottom:4px}
    .sub{color:var(--muted);font-size:.9rem;margin-bottom:24px}
    .gate{max-width:320px;margin:80px auto;text-align:center}
    .gate input{width:100%;padding:12px 16px;border-radius:12px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font:inherit;margin:12px 0}
    .gate button,.refresh{background:var(--grad);color:#06223a;border:none;border-radius:999px;padding:11px 22px;font:inherit;font-weight:700;cursor:pointer}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:26px}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:18px}
    .card .num{font-size:2rem;font-weight:800;background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
    .card .lbl{color:var(--muted);font-size:.82rem;margin-top:2px}
    section{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:18px;margin-bottom:18px}
    section h2{font-size:1rem;margin-bottom:12px}
    .bar-row{display:flex;align-items:center;gap:10px;margin:6px 0;font-size:.85rem}
    .bar-row .k{flex:0 0 140px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .bar-row .bar{flex:1;height:18px;background:var(--surface2);border-radius:6px;overflow:hidden}
    .bar-row .bar i{display:block;height:100%;background:var(--grad)}
    .bar-row .v{flex:0 0 44px;text-align:right;font-weight:700}
    .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:10px}
    .muted{color:var(--muted);font-size:.85rem}
    a{color:var(--accent)}
  </style>
</head>
<body>
  <div id="gate" class="gate">
    <h1>MRAZOSOFT Dáta</h1>
    <p class="muted">Zadaj PIN pre prístup k first-party analytike.</p>
    <input id="pin" type="password" inputmode="numeric" placeholder="PIN" autocomplete="off">
    <button id="enter">Vstúpiť</button>
  </div>

  <div id="app" hidden>
    <div class="topbar">
      <div>
        <h1>First-party analytika</h1>
        <p class="sub">mrazosoft.sk · dáta z vlastného zberu (po cookie súhlase), nezávisle od Google</p>
      </div>
      <button class="refresh" id="refresh">↻ Obnoviť</button>
    </div>
    <div class="grid" id="kpis"></div>
    <section><h2>Návštevy podľa dní</h2><div id="byDay"></div></section>
    <section><h2>Konverzie (dopyty)</h2><div id="leads"></div></section>
    <section><h2>Najnavštevovanejšie stránky</h2><div id="topPages"></div></section>
    <section><h2>Odkiaľ prišli (referrer)</h2><div id="refs"></div></section>
    <p class="muted" id="meta"></p>
  </div>

  <script>
  (function(){
    "use strict";
    var DB = "https://tajny-dc6d6-default-rtdb.europe-west1.firebasedatabase.app";
    var PIN = "2904"; // zmeň podľa potreby
    var LEAD_LABELS = { lead_form:"Formulár", lead_whatsapp:"WhatsApp", lead_call:"Telefón", lead_email:"E-mail" };

    document.getElementById("enter").addEventListener("click", tryEnter);
    document.getElementById("pin").addEventListener("keydown", function(e){ if(e.key==="Enter") tryEnter(); });
    if (sessionStorage.getItem("mzdata_ok")==="1") open();

    function tryEnter(){
      if (document.getElementById("pin").value.trim()===PIN){ sessionStorage.setItem("mzdata_ok","1"); open(); }
      else { document.getElementById("pin").value=""; document.getElementById("pin").placeholder="Nesprávny PIN"; }
    }
    function open(){ document.getElementById("gate").hidden=true; document.getElementById("app").hidden=false; load(); }
    document.getElementById("refresh").addEventListener("click", load);

    function bars(container, obj, fmt){
      var entries = Object.keys(obj).map(function(k){return [k,obj[k]];}).sort(function(a,b){return b[1]-a[1];});
      var max = entries.length ? entries[0][1] : 1;
      var el = document.getElementById(container);
      if(!entries.length){ el.innerHTML='<p class="muted">Zatiaľ žiadne dáta.</p>'; return; }
      el.innerHTML = entries.slice(0,12).map(function(e){
        var w = Math.max(3, Math.round(e[1]/max*100));
        var label = fmt ? fmt(e[0]) : e[0];
        return '<div class="bar-row"><span class="k" title="'+esc(label)+'">'+esc(label)+'</span>'+
               '<span class="bar"><i style="width:'+w+'%"></i></span><span class="v">'+e[1]+'</span></div>';
      }).join("");
    }
    function esc(s){ return String(s).replace(/[&<>"]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];}); }

    function load(){
      document.getElementById("meta").textContent = "Načítavam…";
      fetch(DB + "/analytics/mrazosoft.json?n=" + Date.now())
        .then(function(r){ return r.json(); })
        .then(function(data){ render(data || {}); })
        .catch(function(){ document.getElementById("meta").textContent = "Chyba načítania dát (Firebase pravidlá?)."; });
    }

    function render(data){
      var total=0, pv=0, leads={}, byDay={}, pages={}, refs={};
      Object.keys(data).forEach(function(day){
        var evs = data[day] || {};
        Object.keys(evs).forEach(function(id){
          var e = evs[id]; total++;
          if (e.n==="pageview"){ pv++; byDay[day]=(byDay[day]||0)+1; if(e.p) pages[e.p]=(pages[e.p]||0)+1;
            if(e.r){ try{ var h=new URL(e.r).hostname.replace(/^www\./,""); refs[h]=(refs[h]||0)+1; }catch(x){ refs["(priame)"]=(refs["(priame)"]||0)+1; } }
            else { refs["(priame)"]=(refs["(priame)"]||0)+1; }
          } else { leads[e.n]=(leads[e.n]||0)+1; }
        });
      });
      var leadTotal = Object.keys(leads).reduce(function(s,k){return s+leads[k];},0);
      var cr = pv ? (leadTotal/pv*100).toFixed(1)+" %" : "—";
      document.getElementById("kpis").innerHTML =
        kpi(pv,"Zobrazení stránok") + kpi(leadTotal,"Dopytov spolu") + kpi(cr,"Konverzný pomer") + kpi(Object.keys(byDay).length,"Aktívnych dní");
      bars("byDay", byDay);
      bars("leads", leads, function(k){ return LEAD_LABELS[k]||k; });
      bars("topPages", pages);
      bars("refs", refs);
      document.getElementById("meta").textContent = "Spolu "+total+" eventov · aktualizované "+new Date().toLocaleString("sk-SK");
    }
    function kpi(n,l){ return '<div class="card"><div class="num">'+n+'</div><div class="lbl">'+l+'</div></div>'; }
  })();
  </script>
</body>
</html>
