<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LAB · MRAZOSOFT</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080B12;
  --bg-soft: #0C111C;
  --surface: #111827;
  --border: rgba(255,255,255,0.08);
  --border-strong: rgba(255,255,255,0.16);
  --text: #F0F4F8;
  --muted: #8B9EB7;
  --accent: #38BDF8;
  --accent-2: #818CF8;
  --grad: linear-gradient(135deg, #38BDF8 0%, #818CF8 100%);
  --radius: 16px;
}
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; }
body {
  min-height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', system-ui, sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

/* ── PIN screen ── */
#pinScreen {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  width: 100%;
  max-width: 340px;
  animation: fadeIn 0.4s ease;
}
.lab-logo {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  font-size: 1.1rem;
  letter-spacing: 2px;
  background: var(--grad);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  -webkit-text-fill-color: transparent;
  margin-bottom: 8px;
}
.pin-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 32px 28px;
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.pin-card h2 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 1.2rem;
  font-weight: 700;
  text-align: center;
  margin-bottom: 4px;
}
.pin-input {
  width: 100%;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 13px 16px;
  color: var(--text);
  font-family: inherit;
  font-size: 1rem;
  text-align: center;
  letter-spacing: 4px;
  transition: border-color 0.2s;
  outline: none;
}
.pin-input:focus { border-color: var(--accent); background: rgba(56,189,248,0.06); }
.pin-input::placeholder { letter-spacing: 0; color: var(--muted); }
.pin-btn {
  width: 100%;
  background: var(--grad);
  color: #04121d;
  border: none;
  border-radius: 10px;
  padding: 13px;
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  font-size: 1rem;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.15s;
}
.pin-btn:hover { opacity: 0.9; transform: translateY(-1px); }
.pin-btn:active { transform: translateY(0); }
.pin-err {
  color: #f87171;
  font-size: 0.85rem;
  text-align: center;
  min-height: 20px;
  transition: opacity 0.2s;
}

/* ── Dashboard ── */
#dashboard {
  display: none;
  flex-direction: column;
  gap: 20px;
  width: 100%;
  max-width: 600px;
  animation: fadeIn 0.4s ease;
}
.dash-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
}
.dash-header h1 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 1.4rem;
  font-weight: 700;
}
.dash-lock {
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px 14px;
  color: var(--muted);
  font-size: 0.82rem;
  font-family: inherit;
  cursor: pointer;
  transition: border-color 0.2s;
}
.dash-lock:hover { border-color: var(--border-strong); color: var(--text); }

.tool-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  transition: border-color 0.2s;
}
.tool-card:hover { border-color: var(--border-strong); }
.tool-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
}
.tool-info { flex: 1; }
.tool-name {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  font-size: 1.05rem;
  margin-bottom: 4px;
}
.tool-desc { color: var(--muted); font-size: 0.88rem; line-height: 1.5; }
.status-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #6b7280;
  flex-shrink: 0;
  margin-top: 6px;
  transition: background 0.3s;
}
.status-dot.online { background: #34d399; box-shadow: 0 0 6px rgba(52,211,153,0.5); }
.status-dot.offline { background: #f87171; }

.tool-actions { display: flex; gap: 8px; flex-wrap: wrap; }
.tool-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 9px 18px;
  border-radius: 9px;
  font-family: inherit;
  font-size: 0.88rem;
  font-weight: 600;
  cursor: pointer;
  text-decoration: none;
  border: none;
  transition: opacity 0.2s, transform 0.15s;
}
.tool-btn:hover { opacity: 0.88; transform: translateY(-1px); }
.tool-btn-primary { background: var(--grad); color: #04121d; }
.tool-btn-ghost { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--text); }
.tool-btn-ghost:hover { border-color: var(--border-strong); }

.tool-status-line {
  font-size: 0.8rem;
  color: var(--muted);
  padding-top: 2px;
}
.tool-status-line.ok { color: #34d399; }
.tool-status-line.err { color: #f87171; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<!-- PIN screen -->
<div id="pinScreen">
  <div class="lab-logo">MRAZOSOFT · LAB</div>
  <div class="pin-card">
    <h2>🔒 Admin</h2>
    <input class="pin-input" id="pinInput" type="password" inputmode="numeric"
           maxlength="20" placeholder="PIN" autocomplete="off" />
    <button class="pin-btn" id="pinEnter">Vstúpiť →</button>
    <div class="pin-err" id="pinErr"></div>
  </div>
</div>

<!-- Dashboard -->
<div id="dashboard">
  <div class="dash-header">
    <h1>🛠 LAB Dashboard</h1>
    <button class="dash-lock" id="lockBtn">🔒 Zamknúť</button>
  </div>

  <!-- Akvizičný Radar -->
  <div class="tool-card">
    <div class="tool-top">
      <div class="tool-info">
        <div class="tool-name">📡 Akvizičný Radar</div>
        <div class="tool-desc">Nájde firmy bez webu alebo freelance zákazky — AI fit skóre + hotové SK oslovenie.</div>
      </div>
      <div class="status-dot" id="radarDot"></div>
    </div>
    <div class="tool-status-line" id="radarStatus">Kontrolujem…</div>
    <div class="tool-actions">
      <a class="tool-btn tool-btn-primary" href="http://localhost:5000" target="_blank" rel="noopener">
        Otvoriť Radar ↗
      </a>
      <button class="tool-btn tool-btn-ghost" id="radarRefresh">↺ Skontrolovať</button>
    </div>
  </div>

  <!-- Miesto pre ďalšie nástroje -->
</div>

<script>
(function () {
  'use strict';

  var PIN_HASH = '8c93cd35d2c753657eb0a18984001dba9f3c0409dcac98a381290d9e1ed151f4'; // SHA-256 PINu

  function sha256(str) {
    var enc = new TextEncoder();
    return crypto.subtle.digest('SHA-256', enc.encode(str)).then(function (buf) {
      return Array.from(new Uint8Array(buf)).map(function (b) { return b.toString(16).padStart(2, '0'); }).join('');
    });
  }

  function unlock() {
    document.getElementById('pinScreen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'flex';
    sessionStorage.setItem('lab_auth', '1');
    checkRadar();
  }

  function lock() {
    sessionStorage.removeItem('lab_auth');
    document.getElementById('pinScreen').style.display = 'flex';
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('pinInput').value = '';
    document.getElementById('pinErr').textContent = '';
  }

  function tryPin() {
    var val = (document.getElementById('pinInput').value || '').trim();
    if (!val) return;
    sha256(val).then(function (h) {
      if (h === PIN_HASH) {
        unlock();
      } else {
        var err = document.getElementById('pinErr');
        err.textContent = 'Nesprávny PIN.';
        document.getElementById('pinInput').select();
        setTimeout(function () { err.textContent = ''; }, 2000);
      }
    });
  }

  // Radar status check — pokúsi sa načítať favicon z localhost:5000
  function checkRadar() {
    var dot = document.getElementById('radarDot');
    var status = document.getElementById('radarStatus');
    dot.className = 'status-dot';
    status.className = 'tool-status-line';
    status.textContent = 'Kontrolujem…';
    fetch('http://localhost:5000/', { mode: 'no-cors', cache: 'no-cache', signal: AbortSignal.timeout(3000) })
      .then(function () {
        dot.className = 'status-dot online';
        status.className = 'tool-status-line ok';
        status.textContent = '● Beží na localhost:5000';
      })
      .catch(function () {
        dot.className = 'status-dot offline';
        status.className = 'tool-status-line err';
        status.textContent = '○ Offline — spusti: cd praca-vyhladavac && bash web.sh';
      });
  }

  // Event listeners
  document.getElementById('pinEnter').addEventListener('click', tryPin);
  document.getElementById('pinInput').addEventListener('keydown', function (e) {
    if (e.key === 'Enter') tryPin();
  });
  document.getElementById('lockBtn').addEventListener('click', lock);
  document.getElementById('radarRefresh').addEventListener('click', checkRadar);

  // Auto-unlock ak session ešte platí
  if (sessionStorage.getItem('lab_auth') === '1') {
    unlock();
  } else {
    setTimeout(function () { document.getElementById('pinInput').focus(); }, 100);
  }
})();
</script>
</body>
</html>
